flows:
  public_github_repo_info_mcp:
    name: Public GitHub repository info using MCP tools
    description: >
      Use this flow when the user wants answers about a public GitHub repository
      and explicitly wants DeepWiki called via MCP (they mention MCP tools, Model
      Context Protocol, or "via MCP" / "using MCP" for GitHub or repo Q&A). Do
      not use for generic "tell me about repo X" questions that do not mention MCP.
      This flow calls the `ask_question` tool on the configured DeepWiki MCP
      server (not the ReAct sub-agent). Collect owner/repo, then the question
      (e.g. popularity, design, how something works).
    steps:
      - collect: github_repo
        description: >
          GitHub repository in owner/repo form (e.g. rasaHQ/rasa, facebook/react).
          Lowercase owner and repo names; no URL required.
      - collect: github_repo_question
        description: >
          The user's concrete question about that repository: behavior, design,
          usage, setup, or "what does X do in this repo".
      - call: ask_question # MCP tool name
        mcp_server: deepwiki # MCP server name were tools is available
        mapping:
          input:
            - param: repoName
              slot: github_repo
            - param: question
              slot: github_repo_question
          output:
            - slot: deepwiki_answer
              value: result.structuredContent.result
      - action: utter_deepwiki_answer
