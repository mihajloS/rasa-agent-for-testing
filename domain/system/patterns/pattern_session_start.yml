version: "3.1"
responses:
  utter_welcome:
    - text: |
        Hi there! I'm {agent_name} 👋. I'm a starter kit with some example skills to help you get going. Add your own flows and FAQs to make me your own.

        Try a few examples:
        {example_questions}
    - text: |
        Hi there! I'm {agent_name} and I can help you with GitHub help, FAQs, Feedback and Connect to human. Ask away!
      channel: "browser_audio"
  utter_help:
    - text: "What can I help you with?"
      metadata:
        rephrase: True

slots:
  agent_name:
    type: text
    initial_value: "Codenora"
    mappings:
      - type: controlled
