version: "3.1"

slots:
  url_to_fetch:
    type: text
    mappings:
      - type: from_llm

  url_question:
    type: text
    mappings:
      - type: from_llm

  url_summary:
    type: text
    mappings:
      - type: from_llm

responses:
  utter_ask_url_to_fetch:
    - text: "Which URL should I fetch? Please share the full web address including https://."
      metadata:
        rephrase: True

  utter_ask_url_question:
    - text: "What would you like to know about that page?"
      metadata:
        rephrase: True

  utter_url_summary:
    - text: "{url_summary}"
      metadata:
        rephrase: True
