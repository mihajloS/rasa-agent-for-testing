version: "3.1"

slots:
  github_repo:
    type: text
    mappings:
      - type: from_llm

  github_repo_question:
    type: text
    mappings:
      - type: from_llm

responses:
  utter_ask_github_repo:
    - text: "Which public GitHub repository should I look up? Use owner/repo (for example, rasaHQ/rasa)."
      metadata:
        rephrase: True

  utter_ask_github_repo_question:
    - text: "What would you like to know about that repository?"
      metadata:
        rephrase: True
