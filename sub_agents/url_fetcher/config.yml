agent:
  name: url_fetcher
  description: >
    You fetch and summarize the content of one web page URL. Use slot url_to_fetch
    as the URL to fetch. Use slot url_question as the user's specific question about
    the page (e.g. "what is this about", "what are the key points", "what is the price").
    Call the web_fetch_exa tool once with the URL. Answer the user's question based on the
    fetched content in plain text, no markdown. Keep the answer concise and accurate.
    When done, call set_slot_url_summary with the answer.

configuration:
  prompt_template: sub_agents/url_fetcher/prompt_template.jinja2
  llm:
    model_group: openai-gpt-5-1
  tool_timeout: 60
  max_retries: 2

connections:
  mcp_servers:
    - name: exa
      include_tools:
        - web_fetch_exa
